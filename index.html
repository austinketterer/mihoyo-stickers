<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astral Stickers - Honkai: Star Rail Signal Sticker Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="twinkling"></div>

    <header>
        <div class="header-container">
            <div class="logo">
                <span class="brand-text">ASTRAL STICKERS</span>
                <span class="badge">Signal Edition</span>
            </div>
            <p class="subtitle">Complete Honkai: Star Rail Emote Collection. Optimized, transparent, and ready with one-click installation.</p>
        </div>
    </header>

    <main class="container">
        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-signal">Signal Sticker Packs</button>
            <button class="tab-btn" id="tab-browse">Explore Original Sets</button>
        </div>

        <!-- Search Section -->
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search by character or pack name (e.g. March 7th, Pom-Pom)...">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <!-- Consolidated Signal Packs View -->
        <section id="signal-view" class="view-section active">
            <div class="packs-grid" id="signal-packs-container">
                <!-- Volume Cards will be inserted dynamically by JS -->
            </div>
        </section>

        <!-- Browse View -->
        <section id="browse-view" class="view-section">
            <div class="packs-grid" id="original-packs-container">
                <!-- Original Pack Cards will be inserted dynamically by JS -->
            </div>
        </section>
    </main>

    <!-- Pack Detail Modal -->
    <div class="modal" id="pack-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">Pack Name</h2>
            <div class="modal-info">
                <span class="modal-badge" id="modal-sticker-count">0 Stickers</span>
                <a href="#" class="modal-action-btn" id="modal-action-btn" target="_blank">Add to Signal</a>
            </div>
            <div class="stickers-gallery" id="modal-stickers-grid">
                <!-- Sticker items -->
            </div>
        </div>
    </div>

    <footer>
        <p>This is a community fan project. All art assets belong to HoYoverse (MiHoYo).</p>
        <p>Built with ❤️ for Trailblazers.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
